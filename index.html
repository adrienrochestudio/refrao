<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>refrão — apprendre le portugais avec la musique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-fx"></div>

<header class="topbar">
  <a class="brand" href="index.html"><span class="dot"></span><b>refrão</b></a>
  <nav class="nav">
    <a href="apprendre.html" data-page="learn">Apprendre</a>
    <a href="progression.html" data-page="prog">Progression</a>
  </nav>
  <div id="authSlot" style="display:flex;gap:8px;align-items:center"></div>
</header>

<main class="shell">
  <div class="landing">
    <div class="kicker" id="greet">olá, adrien</div>
    <h1>Apprends le portugais<br>avec <span class="em">la musique</span></h1>
    <p class="lead-sub">Choisis une chanson et grimpe les niveaux — du vocabulaire jusqu'à la chanson entière, par cœur.</p>

    <a href="apprendre.html" class="cta">
      Commencer à apprendre
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>
    <div class="cta-sub" id="entice"></div>
  </div>
</main>

<script src="core.js"></script>
<script>
(async function(){
  R.mountAuthButton(false);
  R.mountChrome("home");
  const h=new Date().getHours();
  document.getElementById("greet").textContent = (h<12?"bom dia":h<18?"boa tarde":"boa noite")+", adrien";
  try{
    const store=await R.getStore();
    const songs=await store.getSongs();
    const n=songs.length;
    document.getElementById("entice").textContent = n ? (n+" chanson"+(n>1?"s":"")+" t'attend"+(n>1?"ent":"")) : "";
  }catch(e){}
})();
</script>
</body>
</html>
