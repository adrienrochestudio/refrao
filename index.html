<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>refrão — apprendre les langues avec la musique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-fx"></div>

<header class="topbar">
  <a class="brand" href="index.html"><span class="dot"></span><b>refrão</b></a>
  <nav class="nav">
    <a href="apprendre.html" data-page="learn">Apprendre</a>
    <a href="progression.html" data-page="prog">Progression</a>
  </nav>
  <div id="authSlot" style="display:flex;gap:8px;align-items:center"></div>
</header>

<main class="shell">
  <div class="landing">
    <div class="kicker" id="greet">boa tarde</div>
    <h1>Apprends <span class="flip-wrap"><span class="flip em" id="flipLang">le portugais</span></span><br>avec la musique</h1>
    <p class="lead-sub">Apprends les langues au rythme de tes chansons préférées — du premier mot au refrain par cœur.</p>

    <a href="apprendre.html" class="cta">
      Commencer à apprendre
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>

    <div class="stats stagger" style="margin-top:48px;max-width:560px;width:100%">
      <div class="stat"><div class="n" id="stSongs">0</div><div class="l">chansons</div></div>
      <div class="stat"><div class="n" id="stLearned">0</div><div class="l">chansons apprises</div></div>
      <div class="stat"><div class="n" id="stXp">0</div><div class="l">XP</div></div>
    </div>
  </div>
</main>

<script src="core.js"></script>
<script>
(function(){
  R.mountAuthButton();
  R.mountChrome("home");

  const h=new Date().getHours();
  document.getElementById("greet").textContent = h<12?"bom dia":h<18?"boa tarde":"boa noite";

  // bascule des langues toutes les 5 s (effet cube vers le bas)
  const langs=["le portugais","l'anglais","l'espagnol","l'allemand"];
  const fl=document.getElementById("flipLang"); let li=0;
  setInterval(()=>{
    fl.classList.add("out");
    setTimeout(()=>{
      li=(li+1)%langs.length; fl.textContent=langs[li];
      fl.classList.add("nofx"); fl.classList.remove("out"); fl.classList.add("top");
      void fl.offsetWidth;
      fl.classList.remove("nofx"); fl.classList.remove("top");
    },560);
  },5000);

  const cta=document.querySelector(".cta");
  R.onAuthProfile(async (u,p)=>{
    cta.setAttribute("href", u ? "apprendre.html" : "auth.html");
    try{
      const store=await R.getStore();
      const songs=await store.getSongs();
      let scope=songs;
      if(u && p && p.lang) scope=songs.filter(s=>(s.lang||"pt")===p.lang);
      const prog=await store.getProgress(R.PROGRESS_ID);
      document.getElementById("stSongs").textContent=scope.length;
      document.getElementById("stLearned").textContent=scope.filter(s=>R.songProgressPct(s,prog)===100).length;
      document.getElementById("stXp").textContent=prog.xp||0;
    }catch(e){}
  });
})();
</script>
</body>
</html>
