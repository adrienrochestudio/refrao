<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>refrão — apprendre les langues avec la musique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-fx"></div>

<header class="topbar">
  <a class="brand" href="index.html"><span class="dot"></span><b>refrão</b></a>
  <nav class="nav">
    <a href="apprendre.html" data-page="learn">Apprendre</a>
    <a href="progression.html" data-page="prog">Progression</a>
  </nav>
  <div id="authSlot" style="display:flex;gap:8px;align-items:center"></div>
</header>

<main class="shell">
  <div class="landing">
    <div class="kicker" id="greet">boa tarde</div>
    <h1>Apprends les langues<br><span class="em">en musique</span></h1>
    <p class="lead-sub" id="leadSub">Apprends en chantant.</p>

    <a href="apprendre.html" class="cta" id="cta">
      Commencer à apprendre
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>

    <div class="stats stagger" id="statRow" style="margin-top:48px;max-width:560px;width:100%">
      <div class="stat"><div class="n" id="stSongs">0</div><div class="l">chansons</div></div>
      <div class="stat"><div class="n" id="stLearned">0</div><div class="l">chansons complétées</div></div>
      <div class="stat"><div class="n" id="stXp">0</div><div class="l">bonnes réponses</div></div>
    </div>
  </div>
</main>

<script src="core.js"></script>
<script>
(function(){
  R.mountAuthButton();
  R.mountChrome("home");

  const h=new Date().getHours();
  document.getElementById("greet").textContent = h<12?"bom dia":h<18?"boa tarde":"boa noite";

  const LEARNER_SUBS=[
    "Apprends en chantant.",
    "Au rythme de tes chansons préférées.",
    "Le refrain comme point de départ.",
    "Tes morceaux deviennent tes leçons.",
    "Chante, comprends, retiens.",
    "Du premier mot au refrain par cœur."
  ];
  const MANAGER_SUBS=[
    "Donne à tes élèves le goût d'apprendre.",
    "Tes cohortes, tes chansons, leurs progrès.",
    "Transforme les musiques en leçons vivantes.",
    "Accompagne chaque apprenant à son rythme."
  ];
  let subs=LEARNER_SUBS, si=0;
  const sub=document.getElementById("leadSub");
  function rotate(){ sub.classList.add("fade"); setTimeout(()=>{ si=(si+1)%subs.length; sub.textContent=subs[si]; sub.classList.remove("fade"); },420); }
  let timer=setInterval(rotate,4200);

  const cta=document.getElementById("cta");
  R.onAuthProfile(async (u,p)=>{
    const isManager = u && p && p.role==="manager";
    cta.setAttribute("href", !u ? "auth.html" : (isManager? "gestion.html" : "apprendre.html"));
    if(cta.firstChild && cta.firstChild.nodeType===3) cta.firstChild.nodeValue = isManager? "Ouvrir l'espace gestion " : "Commencer à apprendre ";
    // sous-titres adaptés au rôle
    subs = isManager ? MANAGER_SUBS : LEARNER_SUBS; si=0; sub.textContent=subs[0];
    if(isManager) document.getElementById("statRow").style.display="none";
    try{
      const store=await R.getStore();
      const songs=await store.getSongs();
      let scope=songs.filter(s=>R.songComplete(s));
      if(u && p && p.lang) scope=scope.filter(s=>(s.lang||"pt")===p.lang);
      const prog=await store.getProgress(R.PROGRESS_ID);
      document.getElementById("stSongs").textContent=scope.length;
      document.getElementById("stLearned").textContent=Object.values(prog.songs||{}).filter(x=>x.completed).length;
      document.getElementById("stXp").textContent=(prog.recent||[]).filter(Boolean).length;
    }catch(e){}
  });
})();
</script>
</body>
</html>
