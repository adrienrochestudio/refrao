<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>refrão — connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-fx"></div>

<header class="topbar">
  <a class="brand" href="index.html"><span class="dot"></span><b>refrão</b></a>
</header>

<main class="shell">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="tabs">
        <button class="tab on" id="tabLogin">Se connecter</button>
        <button class="tab" id="tabSignup">Créer un compte</button>
      </div>

      <!-- LOGIN -->
      <div id="paneLogin">
        <div class="field"><label>Email</label><input id="liEmail" type="email" autocomplete="username"></div>
        <div class="field"><label>Mot de passe</label><input id="liPw" type="password" autocomplete="current-password"></div>
        <div class="err" id="liErr"></div>
        <button class="btn btn-primary" id="liGo" style="width:100%;justify-content:center">Se connecter</button>
      </div>

      <!-- SIGNUP -->
      <div id="paneSignup" class="hidden">
        <div class="field">
          <label>Je suis</label>
          <div class="seg">
            <button class="seg-opt on" data-role="learner">Apprenant</button>
            <button class="seg-opt" data-role="manager">Gestionnaire de cohorte</button>
          </div>
        </div>
        <div class="field"><label>Email</label><input id="suEmail" type="email" autocomplete="username"></div>
        <div class="field"><label>Mot de passe</label><input id="suPw" type="password" autocomplete="new-password" placeholder="6 caractères minimum"></div>

        <div class="field" id="fLang">
          <label>Langue à apprendre</label>
          <select id="suLang"></select>
        </div>

        <div class="field" id="fJoin">
          <label>Code de cohorte <span style="color:var(--text-mute);text-transform:none;letter-spacing:0">(facultatif)</span></label>
          <input id="suJoin" placeholder="si ton enseignant t'en a donné un">
        </div>

        <div class="field hidden" id="fCohort">
          <label>Ton identifiant de cohorte</label>
          <input id="suCohort" placeholder="ex : hugo-3eB-2026">
          <div style="font-size:.78rem;color:var(--text-mute);margin-top:6px">Lettres, chiffres et tirets. C'est le code que tu transmettras à tes apprenants. Modifiable plus tard.</div>
        </div>

        <div class="err" id="suErr"></div>
        <button class="btn btn-primary" id="suGo" style="width:100%;justify-content:center">Créer mon compte</button>
      </div>
    </div>
    <a href="index.html" class="back" style="display:block;text-align:center;margin-top:18px">Retour à l'accueil</a>
  </div>
</main>

<script src="core.js"></script>
<script>
const $=s=>document.querySelector(s);

// déjà connecté -> rediriger
R.onAuthProfile((u,p)=>{ if(u&&p){ location.href = p.role==="manager"?"gestion.html":"apprendre.html"; } });

// langues
$("#suLang").innerHTML = R.LANGS.map(l=>`<option value="${l.code}">${l.label}</option>`).join("");

// onglets
function show(login){
  $("#tabLogin").classList.toggle("on",login);
  $("#tabSignup").classList.toggle("on",!login);
  $("#paneLogin").classList.toggle("hidden",!login);
  $("#paneSignup").classList.toggle("hidden",login);
}
$("#tabLogin").onclick=()=>show(true);
$("#tabSignup").onclick=()=>show(false);

// rôle
let role="learner";
document.querySelectorAll(".seg-opt").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".seg-opt").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); role=b.dataset.role;
    const mgr=role==="manager";
    $("#fJoin").classList.toggle("hidden",mgr);
    $("#fCohort").classList.toggle("hidden",!mgr);
    $("#fLang").querySelector("label").textContent = mgr? "Langue par défaut" : "Langue à apprendre";
  };
});

// login
$("#liGo").onclick=async()=>{
  $("#liErr").textContent="";
  try{ await R.login($("#liEmail").value.trim(), $("#liPw").value); }
  catch(e){ $("#liErr").textContent="Identifiants incorrects."; }
};
$("#liPw").addEventListener("keydown",e=>{ if(e.key==="Enter")$("#liGo").click(); });

// signup
$("#suGo").onclick=async()=>{
  $("#suErr").textContent="";
  const email=$("#suEmail").value.trim(), pw=$("#suPw").value, lang=$("#suLang").value;
  if(!email||pw.length<6){ $("#suErr").textContent="Email valide et mot de passe de 6 caractères minimum."; return; }
  try{
    const opts={email, pw, role, lang};
    if(role==="manager") opts.cohortCode=$("#suCohort").value;
    else opts.cohortCode=$("#suJoin").value;
    const res=await R.signup(opts);
    location.href = res.role==="manager"?"gestion.html":"apprendre.html";
  }catch(e){
    let m=e.message||"Erreur";
    if(/email-already-in-use/.test(m)) m="Cet email a déjà un compte.";
    if(/invalid-email/.test(m)) m="Email invalide.";
    if(/weak-password/.test(m)) m="Mot de passe trop faible (6 caractères min).";
    $("#suErr").textContent=m;
  }
};
</script>
</body>
</html>
