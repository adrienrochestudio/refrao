<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>refrão — connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-fx"></div>

<header class="topbar">
  <a class="brand" href="index.html"><span class="dot"></span><b>refrão</b></a>
</header>

<main class="shell">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="seg" style="margin-bottom:22px">
        <button class="seg-opt on" id="rApprenant" type="button">Apprenant</button>
        <button class="seg-opt" id="rManager" type="button">Gestionnaire</button>
      </div>

      <!-- ============ APPRENANT (sans mot de passe) ============ -->
      <div id="paneLearner">
        <div id="learnerForm">
          <div class="field"><label>Code de cohorte</label><input id="leCode" placeholder="le code donné par ton enseignant" autocapitalize="off"></div>
          <div class="two-col">
            <div class="field"><label>Prénom</label><input id="leFirst" placeholder="ton prénom"></div>
            <div class="field"><label>Nom</label><input id="leLast" placeholder="ton nom"></div>
          </div>
          <div class="field">
            <label>Ton niveau de langue</label>
            <div class="seg">
              <button class="seg-opt on" data-place="debutant" type="button">Débutant</button>
              <button class="seg-opt" data-place="intermediaire" type="button">Intermédiaire</button>
              <button class="seg-opt" data-place="avance" type="button">Avancé</button>
            </div>
            <button class="linkbtn" id="leDontKnow" type="button">Je ne connais pas mon niveau — faire le test</button>
          </div>
          <div class="err" id="leErr"></div>
          <button class="btn btn-primary" id="leGo" style="width:100%;justify-content:center">Commencer</button>
        </div>
        <div id="ltHost" class="hidden"></div>
      </div>

      <!-- ============ GESTIONNAIRE (email + mot de passe) ============ -->
      <div id="paneManager" class="hidden">
        <div class="tabs">
          <button class="tab on" id="tabLogin" type="button">Se connecter</button>
          <button class="tab" id="tabSignup" type="button">Créer un compte</button>
        </div>

        <div id="paneLogin">
          <div class="field"><label>Email</label><input id="liEmail" type="email" autocomplete="username"></div>
          <div class="field"><label>Mot de passe</label><input id="liPw" type="password" autocomplete="current-password"></div>
          <div class="err" id="liErr"></div>
          <button class="btn btn-primary" id="liGo" style="width:100%;justify-content:center">Se connecter</button>
        </div>

        <div id="paneSignup" class="hidden">
          <div class="lead hidden" id="completeHead" style="margin-bottom:18px">Termine la configuration de ton compte.</div>
          <div class="field" id="fEmail"><label>Email</label><input id="suEmail" type="email" autocomplete="username"></div>
          <div class="field" id="fPw"><label>Mot de passe</label><input id="suPw" type="password" autocomplete="new-password" placeholder="6 caractères minimum"></div>
          <div class="field"><label>Langue enseignée</label><select id="suLang"></select></div>
          <div class="field"><label>Ton identifiant de cohorte</label><input id="suCohort" placeholder="ex : hugo-3eB-2026"><div class="hint-small">Lettres, chiffres, tirets. C'est le code que tes apprenants saisiront. Modifiable plus tard.</div></div>
          <div class="err" id="suErr"></div>
          <button class="btn btn-primary" id="suGo" style="width:100%;justify-content:center">Créer mon compte</button>
        </div>
      </div>
    </div>
    <a href="index.html" class="back" style="display:block;text-align:center;margin-top:18px">Retour à l'accueil</a>
  </div>
</main>

<script src="core.js"></script>
<script src="leveltest.js"></script>
<script>
const $=s=>document.querySelector(s);
let completing=false;

R.onAuthProfile((u,p)=>{
  if(u && p){ location.href = p.role==="manager"?"gestion.html":"apprendre.html"; return; }
  if(u && !p && !u.isAnonymous){ openManager(); showComplete(); }   // ancien compte email sans profil
});

$("#suLang").innerHTML = R.LANGS.map(l=>`<option value="${l.code}">${l.label}</option>`).join("");

/* bascule Apprenant / Gestionnaire */
function openLearner(){ $("#rApprenant").classList.add("on"); $("#rManager").classList.remove("on"); $("#paneLearner").classList.remove("hidden"); $("#paneManager").classList.add("hidden"); }
function openManager(){ $("#rManager").classList.add("on"); $("#rApprenant").classList.remove("on"); $("#paneManager").classList.remove("hidden"); $("#paneLearner").classList.add("hidden"); }
$("#rApprenant").onclick=openLearner;
$("#rManager").onclick=openManager;

/* ---------- Apprenant ---------- */
let place="debutant";
document.querySelectorAll("#paneLearner .seg-opt[data-place]").forEach(b=>{
  b.onclick=()=>{ document.querySelectorAll("#paneLearner .seg-opt[data-place]").forEach(x=>x.classList.remove("on")); b.classList.add("on"); place=b.dataset.place; };
});
function learnerValid(){
  const code=$("#leCode").value.trim(), first=$("#leFirst").value.trim();
  if(!code){ $("#leErr").textContent="Entre le code de ta cohorte."; return null; }
  if(!first){ $("#leErr").textContent="Entre au moins ton prénom."; return null; }
  $("#leErr").textContent="";
  return { code, firstName:first, lastName:$("#leLast").value.trim() };
}
async function joinLearner(cefr){
  const base=learnerValid(); if(!base) return;
  try{ await R.joinAsLearner({...base, cefr}); location.href="apprendre.html"; }
  catch(e){ $("#leErr").textContent=e.message||"Impossible de rejoindre la cohorte."; openLearner(); $("#ltHost").classList.add("hidden"); $("#learnerForm").classList.remove("hidden"); }
}
$("#leGo").onclick=()=>{ if(learnerValid()) joinLearner(R.PLACEMENT[place]||"A2"); };
$("#leDontKnow").onclick=()=>{
  if(!learnerValid()) return;
  $("#learnerForm").classList.add("hidden");
  $("#ltHost").classList.remove("hidden");
  LevelTest.run("", cefr=>joinLearner(cefr));
};

/* ---------- Gestionnaire ---------- */
function showLogin(login){ $("#tabLogin").classList.toggle("on",login); $("#tabSignup").classList.toggle("on",!login); $("#paneLogin").classList.toggle("hidden",!login); $("#paneSignup").classList.toggle("hidden",login); }
$("#tabLogin").onclick=()=>showLogin(true);
$("#tabSignup").onclick=()=>showLogin(false);

function showComplete(){
  completing=true; showLogin(false);
  $("#completeHead").classList.remove("hidden");
  $("#fEmail").classList.add("hidden"); $("#fPw").classList.add("hidden");
  $("#suGo").textContent="Terminer mon compte";
}

$("#liGo").onclick=async()=>{ $("#liErr").textContent=""; try{ await R.login($("#liEmail").value.trim(), $("#liPw").value); }catch(e){ $("#liErr").textContent="Identifiants incorrects."; } };
$("#liPw").addEventListener("keydown",e=>{ if(e.key==="Enter")$("#liGo").click(); });

$("#suGo").onclick=async()=>{
  $("#suErr").textContent="";
  const opts={ role:"manager", lang:$("#suLang").value, cohortCode:$("#suCohort").value };
  try{
    let res;
    if(completing){ res=await R.completeProfile(opts); }
    else{
      const email=$("#suEmail").value.trim(), pw=$("#suPw").value;
      if(!email||pw.length<6){ $("#suErr").textContent="Email valide et mot de passe de 6 caractères minimum."; return; }
      res=await R.signup({...opts, email, pw});
    }
    location.href="gestion.html";
  }catch(e){
    let m=e.message||"Erreur";
    if(/email-already-in-use/.test(m)) m="Cet email a déjà un compte.";
    if(/invalid-email/.test(m)) m="Email invalide.";
    if(/weak-password/.test(m)) m="Mot de passe trop faible (6 caractères min).";
    $("#suErr").textContent=m;
  }
};
</script>
</body>
</html>
