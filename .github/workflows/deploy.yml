name: Deploy (Astro vers Pages)

# Déploiement du site (build Astro app/dist) vers GitHub Pages.
# La bascule a eu lieu le 2026-06-12 : source Pages = "GitHub Actions".
# Déploiement CONTINU : tout merge sur main publie le site. Aussi déclenchable
# manuellement. Rollback possible en repassant Pages source sur la branche/racine
# (les fichiers vanilla sont conservés à la racine comme filet de secours).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist
      - id: deploy
        uses: actions/deploy-pages@v4
