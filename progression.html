<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>refrão — progression</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-fx"></div>

<header class="topbar">
  <a class="brand" href="index.html"><span class="dot"></span><b>refrão</b></a>
  <nav class="nav">
    <a href="apprendre.html" data-page="learn">Apprendre</a>
    <a href="progression.html" data-page="prog">Progression</a>
  </nav>
  <div id="authSlot" style="display:flex;gap:8px;align-items:center"></div>
</header>

<main class="shell">
  <div class="section-head"><div><h2><span class="live-dot"></span>Ta progression</h2><div class="sub">ton parcours, langue par langue</div></div></div>

  <div class="stats stagger">
    <div class="stat"><div class="n" id="stCefr">A2</div><div class="l">niveau CEFR</div></div>
    <div class="stat"><div class="n" id="stMastered">0</div><div class="l">cartes maîtrisées</div></div>
    <div class="stat"><div class="n" id="stDone">0</div><div class="l">chansons complétées</div></div>
    <div class="stat"><div class="n" id="stRate">—</div><div class="l">réussite récente</div></div>
  </div>

  <div class="section-head" style="margin-bottom:14px"><div><h2 style="font-size:1.4rem">Par chanson</h2></div></div>
  <div id="rows"></div>
</main>

<script src="core.js"></script>
<script src="srs.js"></script>
<script>
const $=s=>document.querySelector(s);
function ring(pct){
  const r=24, c=2*Math.PI*r, off=c*(1-pct/100);
  return `<div class="ring"><svg viewBox="0 0 58 58"><circle cx="29" cy="29" r="${r}" fill="none" stroke="var(--surface-3)" stroke-width="5"/><circle cx="29" cy="29" r="${r}" fill="none" stroke="var(--blue)" stroke-width="5" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset 1s var(--ease)"/></svg>${pct}%</div>`;
}

(function(){
  R.mountAuthButton();
  R.guard("any", async (profile)=>{
    await R.mountChrome("prog");
    const store=await R.getStore();
    const all=await store.getSongs();
    const lang=(profile && profile.lang)||"pt";
    const songs=all.filter(s=>(s.lang||"pt")===lang);
    const prog=await store.getProgress(R.PROGRESS_ID);
    await SRS.load();

    document.querySelector(".section-head .sub").textContent="ton parcours en "+R.langLabel(lang).toLowerCase();

    const st=SRS.stats();
    const r=(prog.recent||[]);
    $("#stCefr").textContent=(profile&&profile.cefr)||"A2";
    $("#stMastered").textContent=st.mastered;
    $("#stDone").textContent=Object.values(prog.songs||{}).filter(x=>x.completed).length;
    $("#stRate").textContent=r.length?Math.round(r.filter(Boolean).length/r.length*100)+"%":"—";

    const rows=$("#rows");
    if(!songs.length){ rows.innerHTML=`<div class="empty"><b>Rien à afficher</b>Aucune chanson en ${R.langLabel(lang)} pour l'instant.</div>`; return; }
    rows.className="stagger";
    rows.innerHTML=songs.map(s=>{
      const ref=R.refrain(s);
      const pct = ref? SRS.sectionPct(s,ref) : 0;
      const ps=prog.songs[s.id]||{};
      const secs=R.sections(s);
      const chips=secs.map(sec=>{
        const m=SRS.sectionMastered(s,sec);
        return `<span class="chip ${m?'done':''}">${sec.type==="refrain"?"Refrain":"Couplet"}</span>`;
      }).join("");
      const tag = ps.full?`<span class="chip done">Maîtrise complète</span>`:ps.completed?`<span class="chip done">Complétée</span>`:"";
      return `<a class="prog-row" href="apprendre.html?song=${s.id}">
        <div class="left">
          <div class="nm">${R.esc(s.title)} <span class="cefr-inline">${R.esc(s.cefr||"A2")}</span></div>
          <div class="lv">${chips}${tag}</div>
        </div>
        ${ring(pct)}
      </a>`;
    }).join("");
  });
})();
</script>
</body>
</html>
