<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>refrão — progression</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-fx"></div>

<header class="topbar">
  <a class="brand" href="index.html"><span class="dot"></span><b>refrão</b></a>
  <nav class="nav">
    <a href="apprendre.html" data-page="learn">Apprendre</a>
    <a href="progression.html" data-page="prog">Progression</a>
  </nav>
  <div id="authSlot" style="display:flex;gap:8px;align-items:center"></div>
</header>

<main class="shell">
  <div class="section-head"><div><h2>Ta progression</h2><div class="sub">Adrien · português</div></div></div>

  <div class="stats stagger">
    <div class="stat"><div class="n" id="stXp">0</div><div class="l">XP total</div></div>
    <div class="stat"><div class="n" id="stLevels">0</div><div class="l">niveaux validés</div></div>
    <div class="stat"><div class="n" id="stSongs">0</div><div class="l">chansons commencées</div></div>
    <div class="stat"><div class="n" id="stAvg">0%</div><div class="l">progression moyenne</div></div>
  </div>

  <div class="section-head" style="margin-bottom:14px"><div><h2 style="font-size:1.4rem">Par chanson</h2></div></div>
  <div id="rows"></div>
</main>

<script src="core.js"></script>
<script>
const $=s=>document.querySelector(s);
function ring(pct){
  const r=24, c=2*Math.PI*r, off=c*(1-pct/100);
  return `<div class="ring"><svg viewBox="0 0 58 58"><circle cx="29" cy="29" r="${r}" fill="none" stroke="var(--surface-3)" stroke-width="5"/><circle cx="29" cy="29" r="${r}" fill="none" stroke="var(--blue)" stroke-width="5" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset 1s var(--ease)"/></svg>${pct}%</div>`;
}

(async function(){
  R.mountAuthButton(false); await R.mountChrome("prog");
  const store=await R.getStore();
  const songs=await store.getSongs();
  const prog=await store.getProgress();

  let totalLevels=0, started=0, sumPct=0;
  songs.forEach(s=>{
    const done=(prog.songs[s.id]?.done)||[];
    totalLevels+=done.length;
    if(done.length) started++;
    sumPct+=R.songProgressPct(s,prog);
  });
  $("#stXp").textContent=prog.xp||0;
  $("#stLevels").textContent=totalLevels;
  $("#stSongs").textContent=started;
  $("#stAvg").textContent=(songs.length?Math.round(sumPct/songs.length):0)+"%";

  const rows=$("#rows");
  if(!songs.length){ rows.innerHTML=`<div class="empty"><b>Rien à afficher</b>Ajoute une chanson et commence à apprendre.</div>`; return; }
  rows.className="stagger";
  rows.innerHTML=songs.map(s=>{
    const lv=R.buildLevels(s);
    const done=(prog.songs[s.id]?.done)||[];
    const pct=R.songProgressPct(s,prog);
    const chips=lv.map(l=>`<span class="chip ${done.includes(l.key)?'done':''}">${l.name}</span>`).join("");
    return `<a class="prog-row" href="apprendre.html?song=${s.id}">
      <div class="left">
        <div class="nm">${R.esc(s.title)}</div>
        <div class="lv">${chips||'<span class="chip">aucun niveau — ajoute du contenu</span>'}</div>
      </div>
      ${ring(pct)}
    </a>`;
  }).join("");
})();
</script>
</body>
</html>
